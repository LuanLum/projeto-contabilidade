version: "2.4" #tentativa de fix de erro de mem_limit

services:
  api:
    image: ghcr.io/luanlum/projeto-contabilidade:latest
    container_name: backend-api
    mem_limit: 250m #atualizado
    mem_reservation: 128m #atualizado
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env

  nginx-proxy:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81" # Porta do painel de controle
    mem_limit: 120M # Muito leve!
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

  terminal:
    image: tsl0922/ttyd:latest
    container_name: ttyd
    ports:
      - "7681:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Se quiser gerenciar docker por ele
    command: ttyd -p 7681 login # O 'login' força pedir a senha do seu usuário linux
    restart: unless-stopped
