name: Deploy Backend Contabilidade

on:
  push:
    branches: [main]

# Permissões necessárias para escrever no GitHub Packages (GHCR)
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/luanlum/contabilidade-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código (para pegar o docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml para o servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml" # Ou o caminho onde ele estiver
          target: "~/app/contabilidade-backend"

      - name: Executar comandos no servidor via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/contabilidade-backend
            # Login silencioso usando o token automático do GitHub
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Atualiza para a versão mais nova da imagem
            docker compose pull

            # Reinicia os serviços (o --remove-orphans limpa lixo de configs antigas)
            docker compose up -d --remove-orphans

            # Faxina final: Remove imagens 'dead' que sobraram do pull anterior
            docker image prune -f
